<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Jobli - כשגיוס פוגש כישרון</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      direction: ltr; /* OG images keep LTR layout */
    }

    .container {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    .gradient-left {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 630px;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), transparent 70%);
      pointer-events: none;
    }

    .gradient-right {
      position: absolute;
      top: 0;
      right: 0;
      width: 600px;
      height: 630px;
      background: linear-gradient(225deg, rgba(251, 146, 60, 0.15), transparent 70%);
      pointer-events: none;
    }

    .divider {
      position: absolute;
      top: 100px;
      left: 600px;
      width: 1px;
      height: 430px;
      background: rgba(255, 255, 255, 0.1);
    }

    .logo-area {
      position: absolute;
      top: 36px;
      left: 0;
      right: 0;
      text-align: center;
    }

    .logo-lockup {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
    }

    .logo-wordmark {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 38px;
      letter-spacing: -0.5px;
      color: #fff;
      display: inline-block;
      position: relative;
    }

    .half-label-left {
      position: absolute;
      top: 108px;
      left: 0;
      width: 600px;
      text-align: center;
      font-weight: 600;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.85);
    }

    .half-label-right {
      position: absolute;
      top: 108px;
      right: 0;
      width: 600px;
      text-align: center;
      font-weight: 600;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.85);
    }

    .bottom-text {
      position: absolute;
      bottom: 56px;
      left: 0;
      right: 0;
      text-align: center;
    }

    .tagline {
      font-family: 'Satoshi', sans-serif;
      font-weight: 600;
      font-size: 28px;
      color: #fff;
      margin-bottom: 8px;
    }

    .url {
      font-weight: 400;
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
    }

    /* Dashboard mockup */
    .dashboard-mockup {
      position: absolute;
      top: 168px;
      left: 160px;
      width: 280px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 16px;
      transform: rotate(2deg);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .dashboard-header {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .stat-row {
      display: flex;
      gap: 8px;
    }

    .stat-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #0891b2;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 9px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 2px;
    }

    .mini-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 32px;
      margin-top: 14px;
      padding: 0 4px;
    }

    .chart-bar {
      flex: 1;
      background: rgba(8, 145, 178, 0.3);
      border-radius: 3px 3px 0 0;
      min-height: 4px;
    }

    .chart-bar.active {
      background: #0891b2;
    }

    /* Phone mockup */
    .phone-mockup {
      position: absolute;
      top: 158px;
      right: 228px;
      width: 140px;
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px 12px 16px;
      transform: rotate(-2deg);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .phone-notch {
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    .job-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px 10px;
    }

    .job-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .company-logo {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fb923c, #f97316);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }

    .company-name {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
    }

    .job-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .job-salary {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 10px;
    }

    .match-badge {
      display: inline-block;
      background: rgba(251, 146, 60, 0.15);
      border: 1px solid rgba(251, 146, 60, 0.3);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      color: #fb923c;
    }

    .swipe-dots {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 12px;
    }

    .swipe-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
    }

    .swipe-dot.active {
      background: #fb923c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="gradient-left"></div>
    <div class="gradient-right"></div>
    <div class="divider"></div>

    <div class="logo-area">
      <span class="logo-lockup">
        <svg class="logo-icon" viewBox="0 0 281 272" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M277.802 8.7229L260.383 65.0286C259.657 67.3765 257.005 68.5202 254.799 67.4369L204.96 42.9627C203.71 42.3489 202.261 42.2841 200.962 42.784L185.934 48.564C185.078 48.8931 184.267 47.9935 184.684 47.1767L195.598 25.7512C196.491 23.9985 198.08 22.7024 199.977 22.18L271.697 2.42475C275.505 1.37577 278.969 4.94924 277.802 8.7229Z" fill="#F97316"/>
          <path d="M240.521 68.7391L199.998 66.8094C196.335 66.635 193.158 69.3176 192.716 72.9583L179 186C174.069 202.703 158.508 239.359 134.493 257.965C133.655 258.614 134.241 260.017 135.287 259.845C194.67 250.047 221.197 215.304 229.5 186L245.234 74.4316C245.645 71.5166 243.461 68.8791 240.521 68.7391Z" fill="#06B6D4"/>
          <path d="M73.8505 99.9678L128.186 86.5L112.983 187.53C112.787 188.831 112.316 190.122 111.621 191.238C75.8174 248.727 33.928 222.198 61.4027 178.667C62.8459 176.38 60.9936 173.251 58.3239 173.681C45.6338 175.721 20.6608 179.759 17.1861 180.5C12.4986 181.5 8.18608 189.5 8.18608 189.5C-38.3139 282.5 126.874 313.5 162.686 189.5L185.086 29.7813C185.376 27.7086 183.509 25.9828 181.465 26.4358L82.1941 48.4462C78.0057 49.3748 74.8764 52.8715 74.4164 57.1369L70.1461 96.7342C69.9226 98.8062 71.8278 100.469 73.8505 99.9678Z" fill="#06B6D4"/>
        </svg>
        <span class="logo-wordmark">Jobli</span>
      </span>
    </div>

    <div class="half-label-left">גייסו בבהירות</div>
    <div class="half-label-right">מצאו עבודה שמתאימה</div>

    <!-- Employer dashboard mockup -->
    <div class="dashboard-mockup">
      <div class="dashboard-header">דשבורד</div>
      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-value">12</div>
          <div class="stat-label">משרות פעילות</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">284</div>
          <div class="stat-label">מועמדים</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">18</div>
          <div class="stat-label">ראיונות</div>
        </div>
      </div>
      <div class="mini-chart">
        <div class="chart-bar" style="height: 40%"></div>
        <div class="chart-bar" style="height: 65%"></div>
        <div class="chart-bar" style="height: 50%"></div>
        <div class="chart-bar active" style="height: 85%"></div>
        <div class="chart-bar" style="height: 70%"></div>
        <div class="chart-bar" style="height: 55%"></div>
        <div class="chart-bar active" style="height: 100%"></div>
        <div class="chart-bar" style="height: 45%"></div>
        <div class="chart-bar" style="height: 75%"></div>
        <div class="chart-bar" style="height: 60%"></div>
      </div>
    </div>

    <!-- Job seeker phone mockup -->
    <div class="phone-mockup">
      <div class="phone-notch"></div>
      <div class="job-card">
        <div class="job-card-header">
          <div class="company-logo">T</div>
          <div class="company-name">TechFlow</div>
        </div>
        <div class="job-title">מהנדס Frontend</div>
        <div class="job-salary">₪35K – ₪50K</div>
        <div class="match-badge">92% התאמה</div>
      </div>
      <div class="swipe-dots">
        <div class="swipe-dot"></div>
        <div class="swipe-dot active"></div>
        <div class="swipe-dot"></div>
      </div>
    </div>

    <div class="bottom-text">
      <div class="tagline">כשגיוס פוגש כישרון</div>
      <div class="url">job-li.co.il</div>
    </div>
  </div>
</body>
</html>
