<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Jobli - המשרה הבאה שלך, בגלילה אחת</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      direction: ltr; /* OG images keep LTR layout */
    }

    .container {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gradient-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 1200px;
      height: 630px;
      background:
        radial-gradient(ellipse 800px 400px at 50% 65%, rgba(251, 146, 60, 0.1), transparent),
        radial-gradient(ellipse 500px 300px at 70% 25%, rgba(249, 115, 22, 0.07), transparent);
      pointer-events: none;
    }

    .logo-area {
      position: relative;
      margin-top: 30px;
      text-align: center;
    }

    .logo-lockup {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
    }

    .logo-wordmark {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: -0.5px;
      color: #fff;
      display: inline-block;
    }

    .headline {
      position: relative;
      margin-top: 18px;
      font-weight: 700;
      font-size: 36px;
      color: #fff;
      text-align: center;
      line-height: 1.2;
    }

    .subline {
      position: relative;
      margin-top: 12px;
      font-weight: 400;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      max-width: 480px;
    }

    .phone {
      position: relative;
      margin-top: 20px;
      width: 180px;
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 22px 14px 18px;
      box-shadow:
        0 24px 48px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(251, 146, 60, 0.08),
        0 0 80px rgba(251, 146, 60, 0.06);
    }

    .phone-notch {
      width: 48px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .job-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px 12px;
    }

    .job-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .company-logo {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fb923c, #f97316);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .company-info {
      display: flex;
      flex-direction: column;
    }

    .company-name {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
    }

    .company-location {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 1px;
    }

    .job-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .job-salary {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 10px;
    }

    .job-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tag {
      font-size: 9px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      padding: 2px 6px;
    }

    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .match-badge {
      display: inline-block;
      background: rgba(251, 146, 60, 0.15);
      border: 1px solid rgba(251, 146, 60, 0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #fb923c;
    }

    .match-bar-container {
      flex: 1;
      margin-left: 10px;
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    .match-bar-fill {
      width: 92%;
      height: 100%;
      background: linear-gradient(90deg, #fb923c, #f97316);
      border-radius: 2px;
    }

    .card-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .apply-btn {
      width: 100%;
      background: #fb923c;
      border-radius: 8px;
      padding: 8px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .scroll-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .scroll-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
    }

    .scroll-dot.active {
      background: rgba(255, 255, 255, 0.5);
    }

    .platform-badge {
      position: relative;
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 6px 16px;
    }

    .platform-icon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.5);
    }

    .platform-text {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
    }

    .footer-url {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-weight: 400;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="gradient-bg"></div>

    <div class="logo-area">
      <span class="logo-lockup">
        <svg class="logo-icon" viewBox="0 0 281 272" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M277.802 8.7229L260.383 65.0286C259.657 67.3765 257.005 68.5202 254.799 67.4369L204.96 42.9627C203.71 42.3489 202.261 42.2841 200.962 42.784L185.934 48.564C185.078 48.8931 184.267 47.9935 184.684 47.1767L195.598 25.7512C196.491 23.9985 198.08 22.7024 199.977 22.18L271.697 2.42475C275.505 1.37577 278.969 4.94924 277.802 8.7229Z" fill="#F97316"/>
          <path d="M240.521 68.7391L199.998 66.8094C196.335 66.635 193.158 69.3176 192.716 72.9583L179 186C174.069 202.703 158.508 239.359 134.493 257.965C133.655 258.614 134.241 260.017 135.287 259.845C194.67 250.047 221.197 215.304 229.5 186L245.234 74.4316C245.645 71.5166 243.461 68.8791 240.521 68.7391Z" fill="#06B6D4"/>
          <path d="M73.8505 99.9678L128.186 86.5L112.983 187.53C112.787 188.831 112.316 190.122 111.621 191.238C75.8174 248.727 33.928 222.198 61.4027 178.667C62.8459 176.38 60.9936 173.251 58.3239 173.681C45.6338 175.721 20.6608 179.759 17.1861 180.5C12.4986 181.5 8.18608 189.5 8.18608 189.5C-38.3139 282.5 126.874 313.5 162.686 189.5L185.086 29.7813C185.376 27.7086 183.509 25.9828 181.465 26.4358L82.1941 48.4462C78.0057 49.3748 74.8764 52.8715 74.4164 57.1369L70.1461 96.7342C69.9226 98.8062 71.8278 100.469 73.8505 99.9678Z" fill="#06B6D4"/>
        </svg>
        <span class="logo-wordmark">Jobli</span>
      </span>
    </div>

    <div class="headline">המשרה הבאה שלך, בגלילה אחת</div>
    <div class="subline">משרות שמותאמות למה שאתם באמת רוצים</div>

    <!-- Phone mockup -->
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="job-card">
        <div class="job-card-header">
          <div class="company-logo">T</div>
          <div class="company-info">
            <div class="company-name">TechFlow</div>
            <div class="company-location">תל אביב</div>
          </div>
        </div>
        <div class="job-title">מהנדס Frontend</div>
        <div class="job-salary">₪35K – ₪50K</div>
        <div class="job-tags">
          <span class="tag">React</span>
          <span class="tag">מרחוק</span>
          <span class="tag">בכיר</span>
        </div>
        <div class="match-row">
          <div class="match-badge">92%</div>
          <div class="match-bar-container">
            <div class="match-bar-fill"></div>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <div class="apply-btn">הגשת מועמדות</div>
        <div class="scroll-indicator">
          <div class="scroll-dot"></div>
          <div class="scroll-dot active"></div>
          <div class="scroll-dot"></div>
        </div>
      </div>
    </div>

    <div class="platform-badge">
      <div class="platform-icon">&phone;</div>
      <span class="platform-text">חינם ב-iOS ו-Android</span>
    </div>

    <div class="footer-url">job-li.co.il</div>
  </div>
</body>
</html>
