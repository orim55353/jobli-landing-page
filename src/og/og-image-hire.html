<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Jobli למעסיקים - גייסו בבהירות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      direction: ltr; /* OG images keep LTR layout */
    }

    .container {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gradient-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 1200px;
      height: 630px;
      background:
        radial-gradient(ellipse 800px 400px at 50% 60%, rgba(8, 145, 178, 0.12), transparent),
        radial-gradient(ellipse 600px 300px at 20% 30%, rgba(6, 182, 212, 0.08), transparent);
      pointer-events: none;
    }

    .grid-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 1200px;
      height: 630px;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .logo-area {
      position: relative;
      margin-top: 40px;
      text-align: center;
    }

    .logo-lockup {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
    }

    .logo-wordmark {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: -0.5px;
      color: #fff;
      display: inline-block;
    }

    .headline {
      position: relative;
      margin-top: 28px;
      font-weight: 700;
      font-size: 36px;
      color: #fff;
      text-align: center;
      line-height: 1.2;
    }

    .subline {
      position: relative;
      margin-top: 12px;
      font-weight: 400;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      max-width: 560px;
    }

    .dashboard {
      position: relative;
      margin-top: 32px;
      width: 420px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(8, 145, 178, 0.1);
    }

    .dashboard-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .dashboard-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .dashboard-badge {
      font-size: 10px;
      font-weight: 600;
      color: #0891b2;
      background: rgba(8, 145, 178, 0.12);
      border: 1px solid rgba(8, 145, 178, 0.25);
      border-radius: 6px;
      padding: 3px 8px;
    }

    .stat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      padding: 12px 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #0891b2;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 3px;
    }

    .mini-table {
      width: 100%;
    }

    .table-header {
      display: flex;
      padding: 6px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .table-header span {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .col-title { flex: 2; }
    .col-status { flex: 1; text-align: center; }
    .col-apps { flex: 1; text-align: right; }

    .table-row {
      display: flex;
      align-items: center;
      padding: 7px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .table-row:last-child {
      border-bottom: none;
    }

    .row-title {
      flex: 2;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
    }

    .row-status {
      flex: 1;
      text-align: center;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .status-dot.live { background: #22c55e; }
    .status-dot.review { background: #fb923c; }

    .status-text {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.45);
      vertical-align: middle;
    }

    .row-apps {
      flex: 1;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
    }

    .footer-url {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-weight: 400;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="gradient-bg"></div>
    <div class="grid-pattern"></div>

    <div class="logo-area">
      <span class="logo-lockup">
        <svg class="logo-icon" viewBox="0 0 281 272" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M277.802 8.7229L260.383 65.0286C259.657 67.3765 257.005 68.5202 254.799 67.4369L204.96 42.9627C203.71 42.3489 202.261 42.2841 200.962 42.784L185.934 48.564C185.078 48.8931 184.267 47.9935 184.684 47.1767L195.598 25.7512C196.491 23.9985 198.08 22.7024 199.977 22.18L271.697 2.42475C275.505 1.37577 278.969 4.94924 277.802 8.7229Z" fill="#F97316"/>
          <path d="M240.521 68.7391L199.998 66.8094C196.335 66.635 193.158 69.3176 192.716 72.9583L179 186C174.069 202.703 158.508 239.359 134.493 257.965C133.655 258.614 134.241 260.017 135.287 259.845C194.67 250.047 221.197 215.304 229.5 186L245.234 74.4316C245.645 71.5166 243.461 68.8791 240.521 68.7391Z" fill="#06B6D4"/>
          <path d="M73.8505 99.9678L128.186 86.5L112.983 187.53C112.787 188.831 112.316 190.122 111.621 191.238C75.8174 248.727 33.928 222.198 61.4027 178.667C62.8459 176.38 60.9936 173.251 58.3239 173.681C45.6338 175.721 20.6608 179.759 17.1861 180.5C12.4986 181.5 8.18608 189.5 8.18608 189.5C-38.3139 282.5 126.874 313.5 162.686 189.5L185.086 29.7813C185.376 27.7086 183.509 25.9828 181.465 26.4358L82.1941 48.4462C78.0057 49.3748 74.8764 52.8715 74.4164 57.1369L70.1461 96.7342C69.9226 98.8062 71.8278 100.469 73.8505 99.9678Z" fill="#06B6D4"/>
        </svg>
        <span class="logo-wordmark">Jobli</span>
      </span>
    </div>

    <div class="headline">גייסו בבהירות, לא בכאוס</div>
    <div class="subline">דשבורד אחד למשרות, מועמדים ונתוני הגיוס שלכם</div>

    <!-- Dashboard mockup -->
    <div class="dashboard">
      <div class="dashboard-top">
        <div class="dashboard-title">סקירת גיוס</div>
        <div class="dashboard-badge">פעיל</div>
      </div>

      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-value">12</div>
          <div class="stat-label">משרות פעילות</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">284</div>
          <div class="stat-label">מועמדים</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">18</div>
          <div class="stat-label">ראיונות</div>
        </div>
      </div>

      <div class="mini-table">
        <div class="table-header">
          <span class="col-title">משרה</span>
          <span class="col-status">סטטוס</span>
          <span class="col-apps">מועמדויות</span>
        </div>
        <div class="table-row">
          <div class="row-title">מהנדס Frontend</div>
          <div class="row-status">
            <span class="status-dot live"></span>
            <span class="status-text">פעיל</span>
          </div>
          <div class="row-apps">47</div>
        </div>
        <div class="table-row">
          <div class="row-title">מעצב מוצר</div>
          <div class="row-status">
            <span class="status-dot live"></span>
            <span class="status-text">פעיל</span>
          </div>
          <div class="row-apps">38</div>
        </div>
        <div class="table-row">
          <div class="row-title">מהנדס Backend</div>
          <div class="row-status">
            <span class="status-dot review"></span>
            <span class="status-text">בבדיקה</span>
          </div>
          <div class="row-apps">62</div>
        </div>
      </div>
    </div>

    <div class="footer-url">job-li.co.il</div>
  </div>
</body>
</html>
